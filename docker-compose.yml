services:
  postgres:
    image: postgres:16-alpine
    container_name: bonds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bonds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonds}
      POSTGRES_DB: ${POSTGRES_DB:-bonds}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persisted under the gitignored ./data tree, next to the raw data lake.
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bonds} -d ${POSTGRES_DB:-bonds}"]
      interval: 5s
      timeout: 5s
      retries: 10
